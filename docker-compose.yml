services:

  # ─────────────────────────────────────────────
  # PostgreSQL with pgvector extension
  # Using pgvector image instead of plain postgres
  # so vector similarity search works out of the box
  # in product-service.
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: giftwise-postgres
    environment:
      POSTGRES_USER: giftwise
      POSTGRES_PASSWORD: giftwise
      POSTGRES_DB: giftwise
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giftwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis
  # Used by:
  #   - conversation-service: session context + recipient profile (TTL-based)
  #   - api-gateway: rate limiting sliding window counter
  # ─────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: giftwise-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Zookeeper — required by Kafka
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: giftwise-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ─────────────────────────────────────────────
  # Kafka
  # Used by:
  #   - recommendation-service: publishes interaction events (outbox relay)
  #   - analytics-service: consumes interaction events
  #
  # FIX vs NotifyHub config:
  #   KAFKA_ADVERTISED_LISTENERS uses two listeners:
  #     PLAINTEXT_INTERNAL → for Docker-internal service-to-service comms
  #     PLAINTEXT_EXTERNAL → for localhost access (your app running outside Docker)
  #   The old config only had localhost:9092, which broke Docker-internal calls.
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: giftwise-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Kafka UI (Redpanda Console)
  # Browse topics, inspect messages, monitor consumer groups
  # Access at http://localhost:8090
  # Invaluable for debugging the outbox relay and analytics consumer
  # ─────────────────────────────────────────────
  kafka-ui:
    image: redpandadata/console:latest
    container_name: giftwise-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: kafka:29092

volumes:
  postgres-data: