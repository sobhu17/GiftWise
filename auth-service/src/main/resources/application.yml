spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/giftwise
    username: giftwise
    password: giftwise
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  autoconfigure:
    exclude:
      - net.devh.boot.grpc.server.autoconfigure.GrpcServerSecurityAutoConfiguration

  jpa:
    hibernate:
      # validate — Hibernate checks the schema matches your entities but never changes it.
      # Flyway owns all schema changes. Never use create/update in any real environment.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_auth

server:
  port: 8081

# ─────────────────────────────────────────────────────────
# gRPC SERVER — auth-service exposes two RPC methods:
#   ValidateApiKey  → called by api-gateway on every widget request
#   GetBusinessConfig → called by api-gateway to fetch business settings
# Port 9081 is the gRPC port. HTTP (8081) and gRPC (9081) run side by side.
# ─────────────────────────────────────────────────────────
grpc:
  server:
    port: 9081
    negotiation-type: plaintext   # TLS off for local dev

# ─────────────────────────────────────────────────────────
# JWT config
# secret → loaded from env variable GIFTWISE_JWT_SECRET in prod.
# expiration-ms → 86400000 = 24 hours (for business dashboard sessions).
# widget-session-expiration-ms → 7200000 = 2 hours (for anonymous widget sessions).
# ─────────────────────────────────────────────────────────
giftwise:
  jwt:
    secret: ${GIFTWISE_JWT_SECRET:7R88DjWF5544Zjc9kKLx6w8ONAD/VBKae/xnIoonMgg=}
    expiration-ms: 86400000
    widget-session-expiration-ms: 7200000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.giftwise: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE