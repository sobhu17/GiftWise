spring:
  application:
    name: conversation-service

  # No database — conversation-service is stateless with respect to Postgres.
  # All session state lives in Redis with a TTL.
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

server:
  port: 8082

# ─────────────────────────────────────────────────────────
# gRPC SERVER — conversation-service exposes:
#   SendMessage    → receives a user message, loads context, returns response
#   GetSession     → returns current session state (for debugging / dashboard)
#   EndSession     → explicitly closes a session, triggers SessionEndedEvent
#
# gRPC CLIENT — calls recommendation-service to get ranked product suggestions
# ─────────────────────────────────────────────────────────
grpc:
  server:
    port: 9082
    negotiation-type: plaintext
  client:
    recommendation-service:
      address: static://localhost:9083
      negotiation-type: plaintext

# ─────────────────────────────────────────────────────────
# Session config (read by our SessionContextService).
# ttl-seconds → how long an idle session stays alive in Redis.
# max-turns   → safety cap on conversation length before we suggest ending.
# ─────────────────────────────────────────────────────────
giftwise:
  session:
    ttl-seconds: 7200     # 2 hours of inactivity before Redis expires the key
    max-turns: 20

# Resilience4j — circuit breaker around recommendation-service gRPC call
resilience4j:
  circuitbreaker:
    instances:
      recommendation-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.giftwise: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.redis: DEBUG