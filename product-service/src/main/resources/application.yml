spring:
  application:
    name: product-service
  autoconfigure:
    exclude:
      - net.devh.boot.grpc.server.autoconfigure.GrpcServerSecurityAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/giftwise
    username: giftwise
    password: giftwise
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_product
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8084

# ─────────────────────────────────────────────────────────
# gRPC SERVER — product-service exposes:
#   SearchProducts  → semantic search + filter, called by recommendation-service
#   GetProduct      → fetch a single product by id
#   UpsertProduct   → create or update a product (called by admin dashboard)
#
# No gRPC client — product-service doesn't call any other service.
# ─────────────────────────────────────────────────────────
grpc:
  server:
    port: 9084
    negotiation-type: plaintext

# ─────────────────────────────────────────────────────────
# pgvector config (read by our EmbeddingService).
# dimensions → must match the embedding model output size.
#   OpenAI text-embedding-3-small = 1536 dimensions.
# top-k → how many nearest neighbors to return before scalar filtering.
# ─────────────────────────────────────────────────────────
giftwise:
  vector:
    dimensions: 1536
    top-k: 20

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.giftwise: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE