spring:
  application:
    name: api-gateway

  # No database — api-gateway is stateless.
  # State lives in Redis (rate limiting counters).
  data:
    redis:
      host: localhost
      port: 6379
      # password: set via env variable SPRING_DATA_REDIS_PASSWORD in prod
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

server:
  port: 8080

# ─────────────────────────────────────────────────────────
# gRPC CLIENT — api-gateway calls auth-service to validate
# API keys on every incoming widget request.
# No gRPC server here — api-gateway only serves REST/WebSocket.
# ─────────────────────────────────────────────────────────
grpc:
  client:
    auth-service:
      address: static://localhost:9081
      negotiation-type: plaintext   # TLS off for local dev

# ─────────────────────────────────────────────────────────
# Resilience4j — circuit breaker around auth-service gRPC call.
# If auth-service is down, fail fast instead of hanging.
# ─────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

# ─────────────────────────────────────────────────────────
# Rate limiting config (read by our custom RateLimitFilter).
# Redis sliding window: max 100 requests per 60 seconds per businessId.
# ─────────────────────────────────────────────────────────
giftwise:
  rate-limit:
    window-seconds: 60
    max-requests: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.giftwise: DEBUG
    org.springframework.web: DEBUG